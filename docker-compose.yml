# ============================================
# Nexora HRMS — Docker Compose (Local Dev)
# ============================================
# Usage:  docker-compose up -d
# Stop:   docker-compose down
# Reset:  docker-compose down -v  (removes DB data)
# ============================================

services:
  # -------- PostgreSQL Database --------
  postgres:
    image: postgres:16-alpine
    container_name: nexora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexora_hrms
      POSTGRES_USER: nexora_admin
      POSTGRES_PASSWORD: NexoraDB@2026!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora_admin -d nexora_hrms"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------- pgAdmin (Database GUI) --------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexora-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexora.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # -------- NestJS Backend --------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexora-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://nexora_admin:NexoraDB@2026!@postgres:5432/nexora_hrms?schema=public"
      JWT_SECRET: "nexora-jwt-secret-docker-2026"
      JWT_REFRESH_SECRET: "nexora-refresh-secret-docker-2026"
      PORT: "3000"
      NODE_ENV: "development"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  # -------- Next.js Frontend --------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexora-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3000/api/v1"
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
