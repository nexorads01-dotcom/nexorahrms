# ============================================
# Nexora HRMS — Docker Compose (Full Stack)
# ============================================
# Usage:
#   Start all:    docker-compose up -d --build
#   Stop all:     docker-compose down
#   View logs:    docker-compose logs -f
#   Reset DB:     docker-compose down -v
#   Rebuild one:  docker-compose up -d --build backend
# ============================================

services:
  # -------- PostgreSQL Database --------
  postgres:
    image: postgres:16-alpine
    container_name: nexora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexora_hrms}
      POSTGRES_USER: ${POSTGRES_USER:-nexora_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-NexoraDB@2026!}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexora_admin} -d ${POSTGRES_DB:-nexora_hrms}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexora-network

  # -------- pgAdmin (Database GUI) --------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexora-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@nexora.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - nexora-network

  # -------- NestJS Backend API --------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexora-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nexora_admin:NexoraDB@2026!@postgres:5432/nexora_hrms?schema=public}
      JWT_SECRET: ${JWT_SECRET:-nexora-jwt-secret-docker-2026}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-nexora-refresh-secret-docker-2026}
      PORT: "3000"
      NODE_ENV: "production"
      RUN_DB_SEED: ${RUN_DB_SEED:-false}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001,http://localhost:3000,http://127.0.0.1:3001}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexora-network

  # -------- Next.js Frontend --------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:3000/api/v1"
    container_name: nexora-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      # Docker sets HOSTNAME to the container id; Next.js uses it as the bind address → must be 0.0.0.0 or the app is unreachable from the host.
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - nexora-network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  nexora-network:
    driver: bridge
